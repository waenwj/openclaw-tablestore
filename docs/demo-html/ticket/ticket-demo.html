<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ticket Widget Demo</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
    #app { min-height: 100vh; display: block; }
  </style>
</head>
<body>
  <div id="app">
  </div>
  <!-- 1. SDK 需在 ticket-widget 之前加载 -->
  <script src="../../sdk/vibe-tablestore-sdk.umd.js"></script>
  <script src="./ticket-widget.js"></script>
  <script>
    const host = document.querySelector('#app');
    const el = document.createElement('ticket-widget-root');

    el.setAttribute('sdk-config', JSON.stringify({
      baseUrl: '/v2/api/tables/'
    }));

    host.appendChild(el);
  </script>  
</body>
</html>
